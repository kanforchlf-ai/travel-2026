  .score-bar { transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 100; align-items: center; justify-content: center; }

  .pref-icon { transition: transform 0.2s; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .card-in { animation: fadeUp 0.3s ease forwards; }

<body class="bg-slate-50 min-h-screen">

<!-- Header -->

  <h1 class="text-3xl font-black tracking-tight mb-1">2026 暑假旅遊推薦</h1>
  <p class="text-blue-100 text-sm">告訴我你在意什麼，我幫你找最適合的目的地</p>

          <div class="text-xs text-gray-400">6–8 月氣候類型</div>
        </div>
        <select class="pref-select border border-gray-200 rounded-xl text-sm text-gray-700 px-4 py-2.5 bg-gray-50 hover:border-blue-400 transition w-52" data-pref="weather">
          <option value="any">不在意</option>
          <option value="beach">熱帶沙灘型（炎熱晴朗）</option>
          <option value="comfort">溫和舒適型（25°C 上下）</option>
          <option value="cool">涼爽避暑型（20°C 以下）</option>
        </select>
      </div>

      <!-- Flight -->
      <div class="pref-row flex items-center gap-4 px-6 py-4">
        <div class="pref-icon text-3xl w-10 text-center">💺</div>
        <div class="flex-1">
          <div class="font-semibold text-gray-800 text-sm">機票預算</div>
          <div class="text-xs text-gray-400">來回含稅，從台灣出發</div>
        </div>
        <select class="pref-select border border-gray-200 rounded-xl text-sm text-gray-700 px-4 py-2.5 bg-gray-50 hover:border-blue-400 transition w-52" data-pref="flight">
          <option value="any">不在意</option>
          <option value="cheap">越便宜越好（亞洲近程優先）</option>
          <option value="medium">NT$15,000–35,000 可接受</option>
          <option value="far">遠程也沒問題（不設限）</option>
        </select>
      </div>

      <!-- Hotel -->
      <div class="pref-row flex items-center gap-4 px-6 py-4">
        <div class="pref-icon text-3xl w-10 text-center">🏨</div>
        <div class="flex-1">
          <div class="font-semibold text-gray-800 text-sm">住宿預算</div>
          <div class="text-xs text-gray-400">每晚平均（含稅）</div>
        </div>
        <select class="pref-select border border-gray-200 rounded-xl text-sm text-gray-700 px-4 py-2.5 bg-gray-50 hover:border-blue-400 transition w-52" data-pref="hotel">
          <option value="any">不在意</option>
          <option value="budget">平價優先（NT$2,000 以內）</option>
          <option value="medium">適中（NT$2,000–4,000）</option>
          <option value="quality">舒適品質，費用不限</option>
        </select>
      </div>

      <!-- Safety -->
      <div class="pref-row flex items-center gap-4 px-6 py-4">
        <div class="pref-icon text-3xl w-10 text-center">🛡️</div>
        <div class="flex-1">
          <div class="font-semibold text-gray-800 text-sm">治安要求</div>
          <div class="text-xs text-gray-400">旅遊安全程度</div>
        </div>
        <select class="pref-select border border-gray-200 rounded-xl text-sm text-gray-700 px-4 py-2.5 bg-gray-50 hover:border-blue-400 transition w-52" data-pref="safety">
          <option value="any">不在意</option>
          <option value="basic">基本安全即可</option>
          <option value="high">治安越好越好</option>
        </select>
      </div>

      <!-- Cost -->

        <div class="pref-icon text-3xl w-10 text-center">💰</div>
        <div class="flex-1">
          <div class="font-semibold text-gray-800 text-sm">當地消費水準</div>
          <div class="text-xs text-gray-400">餐飲、交通、活動費用</div>

</section>

<!-- Results -->
<section class="max-w-5xl mx-auto mt-8 px-4 pb-16">

const cats = [
  { key: 'weather', label: '天氣', emoji: '☀️' },
  { key: 'flight', label: '機票', emoji: '💺' },
  { key: 'hotel', label: '住宿', emoji: '🏨' },
  { key: 'safety', label: '治安', emoji: '🛡️' },
  { key: 'cost', label: '物價', emoji: '💰' },
];

function scoreColor(s) {
  if (s >= 8) return '#10b981';
  if (s >= 6.5) return '#3b82f6';
  if (s >= 5) return '#f59e0b';
  return '#ef4444';
}

function calcScore(d) {
  let total = 0, w = 0;

  // Weather
  const wx = prefs.weather;
  if (wx === 'beach')   { total += d.wx.beach   * 3; w += 3; }
  else if (wx === 'comfort') { total += d.wx.comfort * 3; w += 3; }
  else if (wx === 'cool')    { total += d.wx.cool    * 3; w += 3; }
  else { total += d.scores.weather * 1; w += 1; }

  // Flight
  const fl = prefs.flight;
  if (fl === 'cheap')  { total += d.scores.flight * 3; w += 3; }
  else if (fl === 'medium') { total += d.scores.flight * 1.5; w += 1.5; }
  else if (fl === 'far')    { total += 5 * 0.5; w += 0.5; }
  else { total += d.scores.flight * 1; w += 1; }

  // Hotel
  const ht = prefs.hotel;
  if (ht === 'budget')  { total += d.scores.hotel * 3; w += 3; }
  else if (ht === 'medium') { total += d.scores.hotel * 1.5; w += 1.5; }
  else if (ht === 'quality') { total += 5 * 0.3; w += 0.3; }
  else { total += d.scores.hotel * 1; w += 1; }

  // Safety
  const sf = prefs.safety;
  if (sf === 'high')  { total += d.scores.safety * 3; w += 3; }
  else if (sf === 'basic') {
    const s = d.scores.safety >= 6 ? d.scores.safety : Math.max(1, d.scores.safety - 2);
    total += s * 1.5; w += 1.5;
  } else { total += d.scores.safety * 0.5; w += 0.5; }

  // Cost
  const co = prefs.cost;
  if (co === 'cheap')   { total += d.scores.cost * 3; w += 3; }
  else if (co === 'medium') { total += d.scores.cost * 1.5; w += 1.5; }
  else if (co === 'premium') { total += 5 * 0.3; w += 0.3; }
  else { total += d.scores.cost * 0.5; w += 0.5; }

  return w > 0 ? total / w : 5;
}

function getSorted() {
  return destinations
    .map(d => ({ ...d, total: calcScore(d) }))
    .sort((a, b) => b.total - a.total);
}

function matchLabel(score) {
  if (score >= 8)   return { text: '極度推薦', color: '#10b981', bg: '#d1fae5' };
  if (score >= 7)   return { text: '非常推薦', color: '#3b82f6', bg: '#dbeafe' };
  if (score >= 6)   return { text: '推薦', color: '#f59e0b', bg: '#fef3c7' };
  if (score >= 5)   return { text: '尚可', color: '#9ca3af', bg: '#f3f4f6' };
  return              { text: '不符偏好', color: '#ef4444', bg: '#fee2e2' };
}

function renderTop3(sorted) {
  const medals = ['🥇', '🥈', '🥉'];
  const borders = ['border-yellow-300 shadow-yellow-100', 'border-gray-300 shadow-gray-100', 'border-orange-200 shadow-orange-100'];
  document.getElementById('top3').innerHTML = sorted.slice(0, 3).map((d, i) => {
    const m = matchLabel(d.total);
    return `
    <div class="card bg-white rounded-2xl border-2 ${borders[i]} shadow-md p-5" onclick="openModal('${d.id}')">
      <div class="flex justify-between items-start mb-3">
        <div class="text-4xl">${medals[i]} ${d.flag}</div>
        <div class="text-right">
          <div class="text-2xl font-black" style="color:${scoreColor(d.total)}">${d.total.toFixed(1)}</div>
          <span class="tag text-xs" style="color:${m.color}; background:${m.bg}">${m.text}</span>
        </div>
      </div>
      <div class="text-lg font-bold text-gray-800">${d.name}</div>
      <div class="text-xs text-gray-400 mb-3">${d.tag}</div>
      ${cats.map(c => `
        <div class="flex items-center gap-2 mb-1">
          <span class="text-xs text-gray-400 w-10">${c.emoji}${c.label}</span>
          <div class="flex-1 bg-gray-100 rounded-full h-1.5">
            <div class="score-bar h-1.5 rounded-full" style="width:${getDisplayScore(d,c.key)*10}%; background:${scoreColor(getDisplayScore(d,c.key))}"></div>
          </div>
          <span class="text-xs font-semibold text-gray-500 w-6 text-right">${getDisplayScore(d,c.key)}</span>
        </div>
      `).join('')}
      <div class="mt-3 pt-3 border-t border-gray-100">
        <div class="text-xs text-gray-400">📍 ${d.cities}</div>
        <div class="text-xs text-blue-400 mt-1">點擊查看詳情 →</div>
      </div>
    </div>`;
  }).join('');
}

function getDisplayScore(d, key) {
  if (key === 'weather') {
    if (prefs.weather === 'beach')   return d.wx.beach;
    if (prefs.weather === 'comfort') return d.wx.comfort;
    if (prefs.weather === 'cool')    return d.wx.cool;
  }
  return d.scores[key];
}

function renderCards(sorted) {
  document.getElementById('count-label').textContent = `共 ${sorted.length} 個目的地`;
  document.getElementById('cards').innerHTML = sorted.map((d, i) => {
    const m = matchLabel(d.total);
    return `
    <div class="card bg-white rounded-xl border border-gray-100 shadow-sm p-4 card-in" style="animation-delay:${i*0.04}s" onclick="openModal('${d.id}')">
      <div class="flex items-start justify-between mb-2">
        <div class="flex items-center gap-2">
          <span class="text-2xl">${d.flag}</span>
          <div>
            <span class="font-bold text-gray-800">${d.name}</span>
            <span class="ml-1 text-xs text-gray-400">${d.region}</span>
          </div>
        </div>
        <div class="flex flex-col items-end gap-1">
          <span class="font-black text-lg" style="color:${scoreColor(d.total)}">${d.total.toFixed(1)}</span>
          <span class="tag" style="color:${m.color}; background:${m.bg}">${m.text}</span>
        </div>
      </div>
      <div class="text-xs text-gray-400 mb-2">${d.tag}</div>
      ${cats.map(c => `
        <div class="flex items-center gap-2 mb-1">
          <span class="text-xs text-gray-400 w-10">${c.emoji}${c.label}</span>
          <div class="flex-1 bg-gray-100 rounded-full h-1">
            <div class="score-bar h-1 rounded-full" style="width:${getDisplayScore(d,c.key)*10}%; background:${scoreColor(getDisplayScore(d,c.key))}"></div>
          </div>
          <span class="text-xs text-gray-400 w-5 text-right">${getDisplayScore(d,c.key)}</span>
        </div>
      `).join('')}
    </div>`;
  }).join('');
}

function updateActiveLabel() {
  const active = Object.entries(prefs).filter(([k,v]) => v !== 'any');
  const labelEl = document.getElementById('active-label');
  if (active.length === 0) {
    labelEl.textContent = '目前全部不在意（顯示預設排名）';
    labelEl.className = 'text-xs text-gray-400';
  } else {
    const prefLabels = {
      weather: { beach:'熱帶沙灘', comfort:'溫和舒適', cool:'涼爽避暑' },
      flight: { cheap:'機票便宜', medium:'中等機票', far:'飛遠沒問題' },
      hotel: { budget:'平價住宿', medium:'適中住宿', quality:'品質住宿' },
      safety: { basic:'基本安全', high:'高治安' },
      cost: { cheap:'物價便宜', medium:'適中物價', premium:'高消費OK' },
    };
    const tags = active.map(([k,v]) => prefLabels[k][v]).join(' · ');
    labelEl.textContent = `已設定：${tags}`;
    labelEl.className = 'text-xs text-blue-500 font-medium';
  }
}

function render() {
  const sorted = getSorted();
  renderTop3(sorted);
  renderCards(sorted);
  updateActiveLabel();
}

function resetPrefs() {
  Object.keys(prefs).forEach(k => prefs[k] = 'any');
  document.querySelectorAll('.pref-select').forEach(s => s.value = 'any');
  render();
}

document.querySelectorAll('.pref-select').forEach(sel => {
  sel.addEventListener('change', e => {
    prefs[e.target.dataset.pref] = e.target.value;
    render();
  });
});

function openModal(id) {
  const d = destinations.find(x => x.id === id);
  const total = calcScore(d);
  const m = matchLabel(total);
  document.getElementById('modal-body').innerHTML = `
    <div class="flex items-center gap-3 mb-5">
      <span class="text-5xl">${d.flag}</span>
      <div class="flex-1">
        <h2 class="text-2xl font-bold text-gray-800">${d.name}</h2>
        <div class="text-sm text-gray-400">${d.region} · ${d.tag}</div>
      </div>
      <div class="text-right">
        <div class="text-3xl font-black" style="color:${scoreColor(total)}">${total.toFixed(1)}</div>
        <span class="tag" style="color:${m.color}; background:${m.bg}">${m.text}</span>
      </div>
    </div>
    <div class="bg-blue-50 rounded-xl p-3 mb-4 text-sm text-blue-700">📍 推薦城市：${d.cities}</div>
    <div class="space-y-2 mb-5">
      ${cats.map(c => `
        <div class="p-3 bg-gray-50 rounded-xl">
          <div class="flex items-center justify-between mb-1.5">
            <span class="font-semibold text-sm text-gray-700">${c.emoji} ${c.label}</span>
            <div class="flex items-center gap-2">
              <div class="w-20 bg-gray-200 rounded-full h-2">
                <div style="width:${getDisplayScore(d,c.key)*10}%; background:${scoreColor(getDisplayScore(d,c.key))}" class="h-2 rounded-full"></div>
              </div>
              <span class="font-bold text-sm" style="color:${scoreColor(getDisplayScore(d,c.key))}">${getDisplayScore(d,c.key)}/10</span>
            </div>
          </div>
          <div class="text-xs text-gray-500">${d.details[c.key]}</div>
        </div>
      `).join('')}
    </div>
    <div class="grid grid-cols-3 gap-2 p-3 bg-gradient-to-r from-blue-50 to-cyan-50 rounded-xl text-center">
      <div><div class="text-xs text-gray-400 mb-1">來回機票</div><div class="text-sm font-bold text-gray-700">${d.flight}</div></div>
      <div class="border-x border-blue-100"><div class="text-xs text-gray-400 mb-1">住宿/晚</div><div class="text-sm font-bold text-gray-700">${d.hotel}</div></div>
      <div><div class="text-xs text-gray-400 mb-1">每日預算</div><div class="text-sm font-bold text-gray-700">${d.daily}</div></div>
    </div>
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
}

render();
</script>
